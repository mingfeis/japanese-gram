<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J-Flash Grammar V6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background: #f8fafc; color: #1e293b; touch-action: manipulation; }
        .glass-panel { background: #ffffff; border-bottom: 2px solid #e2e8f0; }
        .flip-card-inner { transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); transform-style: preserve-3d; height: 620px; }
        .flipped { transform: rotateY(180deg); }
        .front, .back { backface-visibility: hidden; position: absolute; inset: 0; border-radius: 1.5rem; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .front { background: #ffffff; border: 1px solid #e2e8f0; cursor: pointer; }
        .back { transform: rotateY(180deg); background: #ffffff; border: 1px solid #3b82f6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .audio-btn { transition: all 0.2s; display: flex; items-center; justify-center; border: none; background: #eff6ff; color: #3b82f6; border-radius: 50%; width: 40px; height: 40px; }
        .audio-btn:active { transform: scale(0.9); background: #dbeafe; }
        .connection-box { background: #f1f5f9; border-left: 4px solid #94a3b8; padding: 12px; margin-bottom: 16px; font-size: 0.9rem; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div class="w-full max-w-md glass-panel p-4 sticky top-0 z-10 flex items-center justify-between mb-4">
        <div class="flex items-center gap-3">
            <div class="w-2 h-8 bg-blue-500 rounded-full"></div>
            <h1 id="progress-text" class="font-black text-blue-900 tracking-tighter text-xl">0 / 0</h1>
        </div>
        <label class="bg-blue-50 text-blue-600 px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest cursor-pointer border border-blue-100">
            Import CSV <input type="file" id="csv-input" accept=".csv" class="hidden">
        </label>
    </div>

    <div id="main-container" class="w-full max-w-md hidden">
        <div class="relative w-full" style="height: 620px;">
            <div id="card-inner" class="flip-card-inner relative w-full">
                
                <div class="front flex flex-col items-center justify-center p-8" onclick="flipToBack()">
                    <div class="text-blue-500 font-bold mb-4">文法 / 語法</div>
                    <div id="grammar-title" class="text-6xl font-black text-slate-800 text-center leading-tight mb-8">...</div>
                    <div class="text-slate-400 text-sm animate-pulse">點擊查看詳解與例句</div>
                </div>

                <div class="back flex flex-col p-6 overflow-hidden">
                    <div id="grammar-content" class="flex-1 overflow-y-auto no-scrollbar pr-1">
                        </div>
                    
                    <div class="grid grid-cols-4 gap-2 pt-4 border-t border-slate-100 mt-2">
                        <button onclick="handleSRS('again', event)" class="py-3 bg-red-50 text-red-500 rounded-xl font-bold text-[10px]">Again</button>
                        <button onclick="handleSRS('hard', event)" class="py-3 bg-orange-50 text-orange-500 rounded-xl font-bold text-[10px]">Hard</button>
                        <button onclick="handleSRS('good', event)" class="py-3 bg-green-50 text-green-500 rounded-xl font-bold text-[10px]">Good</button>
                        <button onclick="handleSRS('easy', event)" class="py-3 bg-blue-50 text-blue-500 rounded-xl font-bold text-[10px]">Easy</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        let activeQueue = [];
        let totalCount = 0;

        function initApp() {
            document.getElementById('main-container').classList.remove('hidden');
            const saved = localStorage.getItem('grammar_srs_v6');
            if (saved) {
                const d = JSON.parse(saved);
                activeQueue = d.activeQueue || [];
                totalCount = d.totalCount || 0;
                if (activeQueue.length > 0) renderCard();
            }
        }
        window.onload = initApp;

        document.getElementById('csv-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const text = event.target.result;
                const lines = text.split(/\r?\n/);
                activeQueue = [];
                lines.forEach(line => {
                    const parts = line.split(',');
                    if (parts.length >= 2) {
                        activeQueue.push({
                            title: parts[0].trim(),
                            connection: parts[1] ? parts[1].trim() : "",
                            meaning: parts[2] ? parts[2].trim() : "",
                            examples: parts.slice(3).filter(ex => ex.trim() !== "") 
                        });
                    }
                });
                totalCount = activeQueue.length;
                saveProgress(); renderCard();
            };
            reader.readAsText(file);
        });

        function renderCard() {
        if (activeQueue.length === 0) {
            // 如果沒卡片了，顯示完成畫面
            const back = document.getElementById('grammar-content');
            document.getElementById('grammar-title').innerText = "お疲れ様でした！";
            back.innerHTML = `<div class="p-8 text-center text-slate-500 font-bold">所有項目已複習完畢。<br>請重新匯入或繼續練習。</div>`;
            updateUI();
            return;
        }

        const current = activeQueue[0];
        document.getElementById('card-inner').classList.remove('flipped');
        document.getElementById('grammar-title').innerText = current.title;

        const back = document.getElementById('grammar-content');
        // 重構內容填充，確保結構穩定
        let exampleHTML = '';
        current.examples.forEach((ex) => {
            exampleHTML += `
                <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 flex items-start justify-between gap-3 shadow-sm mb-4">
                    <div class="flex-1">
                        <div class="text-slate-800 font-medium leading-relaxed">${ex}</div>
                    </div>
                    <button class="audio-btn flex-shrink-0" onclick="event.stopPropagation(); speak('${ex}')">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M14 5v14l-7-5H3v-4h4l7-5zm3.5 7c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                    </button>
                </div>`;
        });

        back.innerHTML = `
            <div class="text-xs font-black text-blue-500 mb-1 uppercase tracking-widest">Meaning</div>
            <div class="text-xl font-bold text-slate-800 mb-6">${current.meaning}</div>
            <div class="text-xs font-black text-slate-400 mb-2 uppercase tracking-widest">Connection</div>
            <div class="connection-box text-slate-600 leading-relaxed">${current.connection}</div>
            <div class="text-xs font-black text-slate-400 mb-4 uppercase tracking-widest">Examples</div>
            <div class="space-y-2">${exampleHTML}</div>
        `;
        updateUI();
    }

    function handleSRS(type, event) {
        if (event) event.stopPropagation();
        if (activeQueue.length === 0) return;

        // 移除當前項
        const currentItem = activeQueue.shift();

        // 根據按鈕邏輯重新放回隊列
        if (type === 'again') {
            activeQueue.splice(1, 0, currentItem); // 放第二個
        } else if (type === 'hard') {
            activeQueue.splice(Math.min(activeQueue.length, 5), 0, currentItem); // 稍微往後放
        } else if (type === 'good') {
            activeQueue.push(currentItem); // 放到最後
        } else if (type === 'easy') {
            // Easy 邏輯：如果您想徹底移除已學會的，就不用 push 回去
            // 如果想循環練習，請保留下面這行：
            activeQueue.push(currentItem); 
        }

        saveProgress();
        
        // 強制 UI 狀態重置並渲染下一張
        document.getElementById('card-inner').classList.remove('flipped');
        
        // 延遲渲染以確保動畫流暢
        setTimeout(() => {
            renderCard();
        }, 50);
    }

    function updateUI() {
        const finished = totalCount - activeQueue.length;
        // 修正進度條計算，避免分母為 0
        const progress = totalCount > 0 ? (finished / totalCount) * 100 : 0;
        document.getElementById('progress-bar-inner').style.width = `${progress}%`;
        document.getElementById('progress-text').innerText = `${activeQueue.length} items remaining`;
    }
    
    
        function speak(text) {
    window.speechSynthesis.cancel();
    
    // 正則表達式：自動剔除括號（中文翻譯）內容
    // 它會將「行くな。（不許去！）」處理為「行くな。」再發聲
    const japaneseOnly = text.replace(/（[^）]+）/g, '').replace(/\([^)]+\)/g, '');
    
    const utter = new SpeechSynthesisUtterance(japaneseOnly);
    utter.lang = 'ja-JP';
    
    // 確保使用您在 Samsung 設定中選好的 Voice 3
    const vs = window.speechSynthesis.getVoices();
    const voice3 = vs.find(v => v.name.includes('Voice 3') || v.name.includes('ja-jp-x-jd-local'));
    if (voice3) utter.voice = voice3;
    
    window.speechSynthesis.speak(utter);
}
function speak(text) {
    window.speechSynthesis.cancel();
    
    // 正則表達式：自動剔除括號（中文翻譯）內容
    // 它會將「行くな。（不許去！）」處理為「行くな。」再發聲
    const japaneseOnly = text.replace(/（[^）]+）/g, '').replace(/\([^)]+\)/g, '');
    
    const utter = new SpeechSynthesisUtterance(japaneseOnly);
    utter.lang = 'ja-JP';
    
    // 確保使用您在 Samsung 設定中選好的 Voice 3
    const vs = window.speechSynthesis.getVoices();
    const voice3 = vs.find(v => v.name.includes('Voice 3') || v.name.includes('ja-jp-x-jd-local'));
    if (voice3) utter.voice = voice3;
    
    window.speechSynthesis.speak(utter);
}


        function handleSRS(type, event) {
            event.stopPropagation();
            const c = activeQueue.shift();
            if (type === 'again') activeQueue.splice(1, 0, c);
            else if (type === 'hard') activeQueue.splice(Math.min(activeQueue.length, 5), 0, c);
            else if (type === 'good') activeQueue.push(c);
            saveProgress(); renderCard();
        }

        function flipToBack() { document.getElementById('card-inner').classList.add('flipped'); }
        function flipToFront() { document.getElementById('card-inner').classList.remove('flipped'); }
        function saveProgress() { localStorage.setItem('grammar_srs_v6', JSON.stringify({ activeQueue, totalCount })); }
        function updateUI() {
            document.getElementById('progress-text').innerText = `${totalCount - activeQueue.length} / ${totalCount}`;
        }
    </script>
</body>
</html>
